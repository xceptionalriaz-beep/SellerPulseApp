name: sellerpulse
description: "Ebay Market Research Tool"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  geolocator: ^14.0.2
    
  # --- NETWORK & API ---
  http: ^1.2.1             # Talk to eBay API & Ping for IP Address (KEEP THIS ONE)
  supabase_flutter: ^2.0.0 # Your Database/Backend
  flutter_dotenv: ^5.1.0   # Securely hides your secret keys
  device_info_plus: ^10.1.0 # Captures Device, OS, and Browser Info

  # --- STATE MANAGEMENT ---
  provider: ^6.1.2       # Moves data from search bar to charts

  # --- UI & VISUALS ---
  google_fonts: ^6.1.0   # Premium Typography
  flutter_animate: ^4.5.0
  fl_chart: ^1.2.0       # The engine for your Neon Trend Charts
  
  # --- UTILITIES ---
  image_picker: ^1.1.2   # Enables Profile Image Selection
  file_picker: ^10.3.10
  desktop_drop: ^0.7.0
  intl: ^0.20.2
  web: ^1.1.1

  # --- Export & Reports ---
  csv: ^6.0.0
  pdf: ^3.10.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env